name: Android APK bauen

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Web-Assets in das Android-Projekt synchronisieren
        run: |
          npm ci
          npx cap sync android

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Debug-APK bauen
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
          cp app/build/outputs/apk/debug/app-debug.apk ../pomodoro.apk

      - name: APK als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: pomodoro-apk
          path: pomodoro.apk

      - name: APK im "latest"-Release veröffentlichen
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Pomodoro – aktueller Build
          body: |
            Automatisch gebaute Debug-APK. Auf dem Android-Smartphone herunterladen,
            öffnen und installieren („Unbekannte Quellen“ einmalig erlauben).
          prerelease: true
          files: pomodoro.apk
